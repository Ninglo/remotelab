<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RemoteLab">
  <meta name="application-name" content="RemoteLab">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f8f8fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)">
  <meta name="remotelab-build" content="{{BUILD_TITLE}}">
  <link rel="manifest" href="/manifest.json?v={{ASSET_VERSION}}">
  <link rel="icon" href="/favicon.ico?v={{ASSET_VERSION}}" sizes="any">
  <link rel="icon" href="/icon.svg?v={{ASSET_VERSION}}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v={{ASSET_VERSION}}">
  <title>RemoteLab — Sign In</title>
  <style nonce="{{NONCE}}">
    :root {
      color-scheme: light;
      --bg: #f8f8fa;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1c1c1e;
      --text-secondary: #636366;
      --text-muted: #8e8e93;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --button-bg: #1c1c1e;
      --button-text: #ffffff;
      --focus-border: #1c1c1e;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #161618;
        --card: #1c1c1f;
        --border: #2c2c30;
        --text: #e5e5ea;
        --text-secondary: #a1a1a8;
        --text-muted: #6e6e76;
        --error: #f87171;
        --error-bg: #2a1215;
        --button-bg: #e5e5ea;
        --button-text: #161618;
        --focus-border: #60a5fa;
        --shadow: 0 2px 10px rgba(0,0,0,0.4);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: max(24px, env(safe-area-inset-top))
               max(24px, env(safe-area-inset-right))
               max(24px, env(safe-area-inset-bottom))
               max(24px, env(safe-area-inset-left));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow);
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .error {
      background: var(--error-bg);
      color: var(--error);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hidden { display: none !important; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    input[type=text],
    input[type=password] {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.1s;
      margin-bottom: 12px;
    }

    input[type=text]:focus,
    input[type=password]:focus {
      border-color: var(--focus-border);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--focus-border) 10%, transparent);
    }

    .mono {
      font-family: ui-monospace, 'SFMono-Regular', 'Menlo', monospace;
      font-size: 13px;
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      -webkit-appearance: none;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); opacity: 1; }

    .switch {
      text-align: center;
      margin-top: 18px;
    }

    .switch a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .switch a:hover { color: var(--text); }

    .build-stamp {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      user-select: text;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RemoteLab</div>
    <div class="tagline" data-i18n="login.tagline">Sign in to continue</div>

    <div class="error {{ERROR_CLASS}}" data-i18n="login.error">Invalid credentials. Please try again.</div>

    <!-- Password form -->
    <form id="pw-form" method="POST" action="/login">
      <input type="hidden" name="type" value="password">
      <label for="username-input" data-i18n="login.username">Username</label>
      <input type="text" id="username-input" name="username"
             placeholder="Enter username" data-i18n-placeholder="login.usernamePlaceholder"
             autocomplete="username" autocorrect="off" autocapitalize="none">
      <label for="password-input" data-i18n="login.password">Password</label>
      <input type="password" id="password-input" name="password"
             placeholder="Enter password" data-i18n-placeholder="login.passwordPlaceholder"
             autocomplete="current-password">
      <button type="submit" class="btn" data-i18n="login.signIn">Sign In</button>
    </form>

    <!-- Token form -->
    <form id="token-form" class="hidden" method="POST" action="/login">
      <input type="hidden" name="type" value="token">
      <label for="token-input" data-i18n="login.accessToken">Access Token</label>
      <input type="text" id="token-input" name="token" class="mono"
             placeholder="Paste your token" data-i18n-placeholder="login.tokenPlaceholder"
             autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button type="submit" class="btn" data-i18n="login.signIn">Sign In</button>
    </form>

    <div class="switch">
      <a href="#" id="toggle-link" data-i18n="login.switch.useToken">Use access token instead</a>
    </div>

    <div class="build-stamp" title="{{BUILD_TITLE}}">{{BUILD_LABEL}}</div>
  </div>

  <script src="/chat/i18n.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
  <script nonce="{{NONCE}}">
    var tokenForm = document.getElementById('token-form');
    var pwForm = document.getElementById('pw-form');
    var toggleLink = document.getElementById('toggle-link');
    var usePw = '{{MODE}}' === 'pw';
    var t = window.remotelabT || function(key) { return key; };

    function applyMode() {
      if (usePw) {
        tokenForm.classList.add('hidden');
        pwForm.classList.remove('hidden');
        toggleLink.textContent = t('login.switch.useToken');
      } else {
        pwForm.classList.add('hidden');
        tokenForm.classList.remove('hidden');
        toggleLink.textContent = t('login.switch.usePassword');
      }
    }

    applyMode();

    toggleLink.addEventListener('click', function(e) {
      e.preventDefault();
      usePw = !usePw;
      applyMode();
    });
  </script>
</body>
</html>
