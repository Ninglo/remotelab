<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#11141b" media="(prefers-color-scheme: dark)">
  <title>RemoteLab Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --surface-muted: rgba(244, 239, 231, 0.78);
      --border: rgba(24, 28, 38, 0.08);
      --border-strong: rgba(24, 28, 38, 0.14);
      --text: #151922;
      --text-muted: #5c6270;
      --text-soft: #8a909d;
      --accent: #1b2433;
      --accent-soft: rgba(27, 36, 51, 0.08);
      --accent-fg: #f8f6f0;
      --ok: #17724f;
      --ok-bg: rgba(23, 114, 79, 0.1);
      --warn: #ad6c10;
      --warn-bg: rgba(173, 108, 16, 0.12);
      --danger: #bf3f34;
      --danger-bg: rgba(191, 63, 52, 0.11);
      --info: #315da8;
      --info-bg: rgba(49, 93, 168, 0.1);
      --shadow: 0 24px 60px -36px rgba(28, 34, 47, 0.28);
      --shadow-soft: 0 16px 34px -24px rgba(28, 34, 47, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --font-sans: "SF Pro Display", "SF Pro Text", "Avenir Next", "Segoe UI", system-ui, sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", "Menlo", ui-monospace, monospace;
      --topbar-bg: rgba(244, 241, 234, 0.76);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #11141b;
        --surface: rgba(22, 26, 37, 0.86);
        --surface-strong: rgba(26, 31, 44, 0.96);
        --surface-muted: rgba(18, 23, 33, 0.92);
        --border: rgba(203, 214, 228, 0.09);
        --border-strong: rgba(203, 214, 228, 0.16);
        --text: #edf1f7;
        --text-muted: #a9b0be;
        --text-soft: #7f8796;
        --accent: #edf1f7;
        --accent-soft: rgba(237, 241, 247, 0.08);
        --accent-fg: #11141b;
        --ok: #59c49a;
        --ok-bg: rgba(89, 196, 154, 0.12);
        --warn: #e7b34a;
        --warn-bg: rgba(231, 179, 74, 0.12);
        --danger: #ef8a7e;
        --danger-bg: rgba(239, 138, 126, 0.12);
        --info: #7ca5f3;
        --info-bg: rgba(124, 165, 243, 0.12);
        --shadow: 0 28px 80px -42px rgba(0, 0, 0, 0.62);
        --shadow-soft: 0 18px 42px -28px rgba(0, 0, 0, 0.44);
        --topbar-bg: rgba(17, 20, 27, 0.72);
      }
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(111, 139, 177, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(216, 191, 145, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 18%),
        var(--bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.7), transparent 82%);
      opacity: 0.22;
    }

    a, button, input { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }
    button {
      border: 0;
      background: none;
      color: inherit;
      padding: 0;
    }
    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    summary:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--info) 70%, white 12%);
      outline-offset: 3px;
    }
    summary { list-style: none; }
    summary::-webkit-details-marker { display: none; }

    .skip-link {
      position: absolute;
      left: 16px;
      top: -60px;
      z-index: 60;
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--accent-fg);
      background: var(--accent);
      text-decoration: none;
      transition: top 0.2s ease;
    }
    .skip-link:focus { top: 16px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: max(18px, env(safe-area-inset-top)) 24px 18px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      background: var(--topbar-bg);
    }
    .topbar-inner {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .eyebrow {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand-row h1 {
      margin: 0;
      font-size: clamp(1.18rem, 2vw, 1.45rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .cache-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .cache-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--info);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--info) 16%, transparent);
    }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .view-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      flex-wrap: wrap;
    }
    .view-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition:
        transform 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        background 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .view-link:hover {
      transform: translateY(-1px);
      color: var(--text);
    }
    .view-link.is-active {
      background: var(--accent);
      color: var(--accent-fg);
      box-shadow: 0 12px 28px -18px color-mix(in srgb, var(--accent) 70%, black 12%);
    }
    .nav-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent-fg) 16%, transparent);
      font-size: 11px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .topbar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-muted);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .topbar-toggle:hover,
    .topbar-toggle.is-active {
      background: var(--surface-strong);
      color: var(--text);
    }

    .summary-toggle {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .summary-toggle:hover {
      background: var(--surface-strong);
      color: var(--text);
    }
    .summary-toggle .chevron {
      transition: transform 0.2s ease;
    }
    .summary-toggle.is-open .chevron {
      transform: rotate(180deg);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      cursor: pointer;
      transition:
        transform 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        background 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        border-color 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow 0.18s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset;
      white-space: nowrap;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
    }
    .btn:active { transform: translateY(1px) scale(0.985); }
    .btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: color-mix(in srgb, var(--accent) 74%, transparent);
    }
    .btn-subtle {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
      box-shadow: none;
    }
    .btn-subtle:hover {
      background: var(--surface-muted);
      color: var(--text);
      border-color: var(--border);
    }

    .shell {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .page-panel,
    .control-panel {
      padding: 22px 24px;
    }
    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    .section-title {
      margin: 8px 0 0;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.05em;
    }
    .section-copy {
      margin: 10px 0 0;
      max-width: 64ch;
      color: var(--text-muted);
      font-size: 14px;
    }
    .inline-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-muted);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .metric-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
    }
    .metric-card strong {
      display: block;
      margin-top: 10px;
      font-size: clamp(1.65rem, 2.8vw, 2.25rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
    }
    .metric-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .metric-note {
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .metric-card[data-tone="danger"] {
      background: linear-gradient(180deg, color-mix(in srgb, var(--danger-bg) 94%, transparent), transparent), var(--surface-strong);
    }
    .metric-card[data-tone="ok"] {
      background: linear-gradient(180deg, color-mix(in srgb, var(--ok-bg) 94%, transparent), transparent), var(--surface-strong);
    }
    .metric-card[data-tone="accent"] {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 94%, transparent), transparent), var(--surface-strong);
    }

    .control-row {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 16px;
      align-items: end;
    }
    .control-side {
      display: flex;
      align-items: end;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .search-field span {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .search-field input {
      min-height: 48px;
      width: 100%;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }
    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .sort-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 220px;
      flex-shrink: 0;
    }
    .sort-field span {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .sort-field select {
      min-height: 40px;
      width: 100%;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition:
        transform 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        background 0.18s cubic-bezier(0.16, 1, 0.3, 1),
        color 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .chip:hover {
      transform: translateY(-1px);
      color: var(--text);
    }
    .chip.is-active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: color-mix(in srgb, var(--accent) 72%, transparent);
    }

    .view-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .section-panel {
      padding: 22px 24px;
    }
    .section-panel-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }
    .section-panel-head h3 {
      margin: 8px 0 0;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .section-panel-copy {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--text-muted);
      max-width: 62ch;
    }
    .section-count {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .section-count strong {
      font-size: 1.5rem;
      line-height: 1;
      letter-spacing: -0.05em;
      font-variant-numeric: tabular-nums;
    }
    .section-count span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .list-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface-strong);
      overflow: hidden;
    }
    .row-card[open] {
      box-shadow: var(--shadow-soft);
    }
    .row-summary {
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(180px, 1.3fr) minmax(160px, 0.9fr) minmax(140px, 0.9fr) minmax(140px, 0.9fr) minmax(220px, 1.3fr);
      gap: 12px;
      padding: 16px 18px;
      align-items: start;
    }
    .row-card[open] .row-summary {
      border-bottom: 1px solid var(--border);
    }
    .row-main {
      min-width: 0;
    }
    .row-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .row-sub {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--text-soft);
    }
    .row-cell {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cell-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .cell-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .cell-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .tag-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .tag::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .tag[data-tone="danger"] {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: color-mix(in srgb, var(--danger) 18%, transparent);
    }
    .tag[data-tone="warn"] {
      color: var(--warn);
      background: var(--warn-bg);
      border-color: color-mix(in srgb, var(--warn) 18%, transparent);
    }
    .tag[data-tone="ok"] {
      color: var(--ok);
      background: var(--ok-bg);
      border-color: color-mix(in srgb, var(--ok) 18%, transparent);
    }
    .tag[data-tone="muted"] {
      color: var(--text-muted);
      background: var(--surface-muted);
      border-color: var(--border);
    }
    .tag[data-tone="accent"] {
      color: var(--text);
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 16%, transparent);
    }

    .detail-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .detail-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px 15px;
      background: var(--surface-muted);
      min-height: 100%;
    }
    .detail-card h4 {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .detail-card p {
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--text);
      line-height: 1.55;
    }
    .detail-card .muted {
      color: var(--text-muted);
    }
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }
    .timeline-item {
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .timeline-item:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .timeline-item strong {
      display: block;
      font-size: 13px;
    }
    .timeline-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-soft);
    }
    .timeline-text {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .link-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
      min-width: 28px;
    }
    .link-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    .link-chip:hover {
      transform: translateY(-1px);
      color: var(--text);
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .analytics-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .analytics-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.3fr) minmax(120px, 0.7fr) minmax(120px, 0.7fr);
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
    }
    .analytics-main {
      min-width: 0;
    }
    .analytics-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .analytics-sub {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .analytics-metric {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .analytics-metric strong {
      font-size: 16px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }
    .analytics-metric span {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .analytics-meter {
      margin-top: 8px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      overflow: hidden;
    }
    .analytics-meter-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--info), var(--accent));
    }
    .analytics-meter-fill[data-tone="warn"] {
      background: linear-gradient(90deg, var(--warn), color-mix(in srgb, var(--warn) 72%, var(--danger)));
    }
    .analytics-meter-fill[data-tone="ok"] {
      background: linear-gradient(90deg, var(--ok), color-mix(in srgb, var(--ok) 72%, var(--info)));
    }
    .analytics-pair-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }
    .action-btn[data-tone="primary"] {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: color-mix(in srgb, var(--accent) 72%, transparent);
    }
    .action-btn[data-tone="success"] {
      background: var(--ok-bg);
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 28%, var(--border));
    }
    .action-btn[data-tone="danger"] {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 28%, var(--border));
    }

    .empty-state,
    .error-state {
      padding: 24px;
      border-radius: 22px;
      border: 1px dashed var(--border-strong);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 14px;
    }
    .error-state { color: var(--danger); }
    .empty-state .btn,
    .error-state .btn {
      margin-top: 14px;
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .skeleton-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skeleton {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-strong) 84%, var(--surface-muted));
      min-height: 120px;
    }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.34), transparent);
      animation: shimmer 1.5s infinite;
    }
    .skeleton-row {
      min-height: 96px;
    }
    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    dialog {
      width: min(420px, calc(100vw - 24px));
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface-strong);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    dialog::backdrop { background: rgba(8, 10, 15, 0.42); }
    dialog h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
    }
    dialog p {
      margin: 12px 0 0;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    dialog label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    dialog input[type="text"] {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text);
      font-family: var(--font-mono);
    }
    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    #toasts {
      position: fixed;
      right: 20px;
      bottom: max(20px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 60;
      pointer-events: none;
    }
    .toast {
      min-width: 220px;
      max-width: min(380px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: var(--surface-strong);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      pointer-events: auto;
      animation: toast-in 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .toast-ok {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 30%, transparent);
      background: color-mix(in srgb, var(--ok-bg) 92%, var(--surface-strong));
    }
    .toast-err {
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 30%, transparent);
      background: color-mix(in srgb, var(--danger-bg) 92%, var(--surface-strong));
    }
    .toast-info {
      color: var(--info);
      border-color: color-mix(in srgb, var(--info) 30%, transparent);
      background: color-mix(in srgb, var(--info-bg) 92%, var(--surface-strong));
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1240px) {
      .topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }
      .topbar-tools {
        width: 100%;
        justify-content: space-between;
      }
      .metric-grid,
      .skeleton-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .detail-grid {
        grid-template-columns: 1fr 1fr;
      }
      .analytics-pair-grid {
        grid-template-columns: 1fr;
      }
      .row-summary {
        grid-template-columns: minmax(160px, 1.2fr) minmax(150px, 0.8fr) minmax(140px, 0.8fr) minmax(160px, 1fr);
      }
      .row-summary .row-cell:last-child {
        grid-column: span 2;
      }
    }

    @media (max-width: 860px) {
      .shell,
      .topbar-inner {
        width: min(100vw - 20px, 860px);
      }
      .control-row {
        grid-template-columns: 1fr;
      }
      .control-side {
        justify-content: flex-start;
        align-items: stretch;
      }
      .chip-row {
        justify-content: flex-start;
      }
      .sort-field {
        min-width: 0;
        width: 100%;
      }
      .detail-grid {
        grid-template-columns: 1fr;
      }
      .analytics-row {
        grid-template-columns: 1fr;
      }
      .row-summary {
        grid-template-columns: 1fr;
      }
      .row-summary .row-cell:last-child {
        grid-column: span 1;
      }
      .section-panel-head,
      .page-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .section-count {
        align-items: flex-start;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        padding-left: 16px;
        padding-right: 16px;
      }
      .view-nav {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
      }
      .top-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .top-actions .btn-subtle {
        grid-column: span 2;
      }
      .page-panel,
      .control-panel,
      .section-panel {
        padding: 18px;
      }
      .metric-grid,
      .skeleton-grid {
        grid-template-columns: 1fr 1fr;
      }
      .detail-actions,
      .dialog-actions {
        width: 100%;
      }
      .detail-actions .action-btn,
      .dialog-actions .btn {
        flex: 1 1 calc(50% - 6px);
      }
      #toasts {
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
      }
      .toast {
        min-width: 0;
        max-width: none;
      }
      .topbar .brand-block .eyebrow { display: none; }
      .topbar-toggle { display: flex; }
      .topbar:not(.is-expanded) .top-actions { display: none; }
      .summary-toggle { display: inline-flex; }
      .page-panel:not(.is-expanded) .metric-grid { display: none; }
    }
  </style>
</head>
<body>
<a class="skip-link" href="#content">Skip to content</a>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand-block">
      <p class="eyebrow">user workbench</p>
      <div class="brand-row">
        <h1>RemoteLab Admin</h1>
        <span class="cache-pill" id="cache-pill">加载中</span>
      </div>
    </div>

    <div class="topbar-tools">
      <nav class="view-nav" id="view-nav" aria-label="Admin views">
        <a class="view-link" href="./" data-view="pending">待处理 <span class="nav-count" id="nav-pending-count">0</span></a>
        <a class="view-link" href="./?view=users" data-view="users">用户 <span class="nav-count" id="nav-users-count">0</span></a>
        <a class="view-link" href="./?view=instances" data-view="instances">实例 <span class="nav-count" id="nav-instances-count">0</span></a>
        <a class="view-link" href="./?view=billing" data-view="billing">计费 <span class="nav-count" id="nav-billing-count">0</span></a>
      </nav>

      <button class="topbar-toggle" id="topbar-toggle" aria-label="更多操作" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="3.5" cy="9" r="1.5" fill="currentColor"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="14.5" cy="9" r="1.5" fill="currentColor"/></svg>
      </button>

      <div class="top-actions">
        <button class="btn btn-primary" id="btn-trial">创建试用实例</button>
        <button class="btn btn-primary" id="btn-custom">创建自定义实例</button>
        <button class="btn" id="btn-converge">收敛库存</button>
        <button class="btn" id="btn-refresh">刷新</button>
        <button class="btn btn-subtle" id="btn-logout">退出</button>
      </div>
    </div>
  </div>
</header>

<main class="shell" id="content">
  <section class="panel page-panel">
    <div class="page-head">
      <div>
        <p class="eyebrow" id="view-kicker">workbench</p>
        <h2 class="section-title" id="view-title">加载中</h2>
        <p class="section-copy" id="view-copy">正在读取用户工作台和实例快照。</p>
      </div>
      <div class="inline-meta" id="page-meta"></div>
    </div>
    <button class="summary-toggle" id="summary-toggle" aria-expanded="false">
      <span>展开数据</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="metric-grid" id="metric-grid"></div>
  </section>

  <section class="panel control-panel">
    <div class="control-row">
      <label class="search-field">
        <span id="search-label">Search</span>
        <input type="search" id="search-input" placeholder="搜索用户、来源或实例" autocomplete="off" spellcheck="false">
      </label>
      <div class="control-side">
        <div class="chip-row" id="filter-chips"></div>
        <label class="sort-field" id="sort-field" hidden>
          <span id="sort-label">排序</span>
          <select id="sort-select" aria-label="排序方式"></select>
        </label>
      </div>
    </div>
  </section>

  <section class="view-stack" id="pending-view"></section>
  <section class="view-stack" id="users-view" hidden></section>
  <section class="view-stack" id="instances-view" hidden></section>
  <section class="view-stack" id="billing-view" hidden></section>
</main>

<div id="toasts"></div>

<dialog id="dlg-create">
  <h2>创建实例</h2>
  <p>使用短小的实例名，只保留小写字母、数字和连字符。</p>
  <label for="inp-name">实例名</label>
  <input type="text" id="inp-name" placeholder="例如：demo" autocomplete="off" spellcheck="false">
  <div class="dialog-actions">
    <button class="btn" id="btn-dlg-cancel">取消</button>
    <button class="btn btn-primary" id="btn-dlg-confirm">创建</button>
  </div>
</dialog>

<dialog id="dlg-delete">
  <h2>删除实例</h2>
  <p>确认删除 <strong id="del-name"></strong>？这会先停止实例，再把它从 registry 里移除。</p>
  <div class="dialog-actions">
    <button class="btn" id="btn-del-cancel">取消</button>
    <button class="btn" id="btn-del-confirm" style="background:var(--danger);border-color:var(--danger);color:#fff">删除</button>
  </div>
</dialog>

<script>
(function() {
  'use strict';

  var PENDING_QUEUE_META = {
    needsBinding: {
      label: '待绑定',
      copy: '这些用户已经进入工作台，但还没有绑定到实例。要尽早决定分配还是暂不进入试用。',
      tone: 'danger',
    },
    feedback: {
      label: '反馈待处理',
      copy: '这些用户有明确反馈、阻塞或交付断裂信号，优先处理问题本身。',
      tone: 'warn',
    },
    followUp: {
      label: '待跟进',
      copy: '这些用户已经绑定实例，但最近趋冷、停滞，适合主动回访。',
      tone: 'accent',
    },
    recent: {
      label: '最近活跃',
      copy: '这些用户近期仍在使用，适合顺手了解真实场景和更深入的需求。',
      tone: 'ok',
    }
  };

  var VIEW_CONFIGS = {
    pending: {
      kicker: 'pending work',
      title: '先处理真正需要你介入的用户工作项。',
      copy: '默认首页只看人，不先看实例。未绑定、反馈、跟进和最近活跃会自动分队列。',
      searchLabel: '搜索工作项',
      searchPlaceholder: '搜索用户、来源、实例或反馈线索',
      filters: [
        { key: 'all', label: '全部' },
        { key: 'needsBinding', label: '待绑定' },
        { key: 'feedback', label: '反馈待处理' },
        { key: 'followUp', label: '待跟进' },
        { key: 'recent', label: '最近活跃' }
      ]
    },
    users: {
      kicker: 'user ledger',
      title: '这里是完整用户账本，不只是今天待处理的人。',
      copy: '默认看绑定状态、最近动作和建议动作；展开再看反馈、事件和实例细节。',
      searchLabel: '搜索用户',
      searchPlaceholder: '搜索用户名、来源、标签或实例',
      filters: [
        { key: 'all', label: '全部' },
        { key: 'bound', label: '已绑定' },
        { key: 'unbound', label: '未绑定' },
        { key: 'feedback', label: '有反馈' },
        { key: 'atRisk', label: '需跟进' },
        { key: 'active', label: '活跃中' }
      ]
    },
    instances: {
      kicker: 'resource layer',
      title: '实例是支撑层，只有在调度或诊断时才需要看全量。',
      copy: '默认先把最近在用、用量高的实例排到前面，避免你在大量冷实例里翻找。',
      searchLabel: '搜索实例',
      searchPlaceholder: '搜索实例名、绑定用户或入口地址',
      filters: [
        { key: 'all', label: '全部' },
        { key: 'recentlyUsed', label: '最近在用' },
        { key: 'available', label: '可分配' },
        { key: 'occupied', label: '已占用' },
        { key: 'issues', label: '有异常' }
      ],
      sortLabel: '实例排序',
      sorts: [
        { key: 'smart', label: '智能排序' },
        { key: 'recent', label: '最近活跃' },
        { key: 'usage', label: '按 token 用量' },
        { key: 'cost', label: '按费用' },
        { key: 'runs', label: '按调用数' },
        { key: 'name', label: '按名称' }
      ]
    },
    billing: {
      kicker: 'billing lens',
      title: '把 token 和费用拆到用户、模型、工具、操作类型和后台功能层。',
      copy: '这里不只看实例负载，而是直接看成本结构，先尽量多监控，再决定删哪些维度。',
      searchLabel: '搜索计费项',
      searchPlaceholder: '搜索用户、实例、模型、工具或操作类型',
      filters: [
        { key: 'all', label: '全部' },
        { key: 'background', label: '后台偏重' },
        { key: 'foreground', label: '直聊偏重' },
        { key: 'exactCost', label: '有实价' },
        { key: 'estimated', label: '估算为主' }
      ]
    }
  };

  var state = {
    view: readViewFromLocation(),
    search: '',
    filters: {
      pending: 'all',
      users: 'all',
      instances: 'all',
      billing: 'all'
    },
    sorts: {
      pending: 'default',
      users: 'default',
      instances: 'smart',
      billing: 'default'
    },
    pendingDelete: null,
    workbench: null,
    dashboard: null,
    billing: null,
    billingPromise: null,
  };

  function basePath() {
    var path = window.location.pathname || '/';
    if (path === '/') return '/';
    return path.endsWith('/') ? path : path + '/';
  }

  function withBase(path) {
    if (/^https?:\/\//.test(path)) return path;
    return basePath() + String(path || '').replace(/^\/+/, '');
  }

  function buildApiPath(path, options) {
    var query = new URLSearchParams();
    if (options && options.force) query.set('refresh', '1');
    if (options && options.checks) query.set('checks', '1');
    return query.toString() ? String(path || '').replace(/\?.*$/, '') + '?' + query.toString() : path;
  }

  function activeViewContainerId() {
    return state.view + '-view';
  }

  function toast(message, type) {
    var node = document.createElement('div');
    node.className = 'toast toast-' + (type || 'info');
    node.textContent = message;
    document.getElementById('toasts').appendChild(node);
    setTimeout(function() { node.remove(); }, 4200);
  }

  async function api(path, options) {
    var res = await fetch(withBase(path), {
      headers: { 'Content-Type': 'application/json' },
      ...options,
      body: options && options.body ? JSON.stringify(options.body) : undefined,
    });
    var text = await res.text();
    var data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      data = { error: text || 'Request failed' };
    }
    if (!res.ok) throw new Error(data.error || 'Request failed (' + res.status + ')');
    return data;
  }

  function esc(value) {
    var node = document.createElement('div');
    node.textContent = value == null ? '' : String(value);
    return node.innerHTML;
  }

  function copyText(text) {
    if (!text) {
      toast('没有可复制的内容', 'err');
      return;
    }
    navigator.clipboard.writeText(text).then(
      function() { toast('已复制', 'ok'); },
      function() { toast('复制失败', 'err'); }
    );
  }

  function readViewFromLocation() {
    var view = new URLSearchParams(window.location.search).get('view') || 'pending';
    return VIEW_CONFIGS[view] ? view : 'pending';
  }

  function currentFilter() {
    return state.filters[state.view] || 'all';
  }

  function currentSort() {
    return state.sorts[state.view] || 'default';
  }

  function setView(view) {
    if (!VIEW_CONFIGS[view]) view = 'pending';
    state.view = view;
    state.search = '';
    document.getElementById('search-input').value = '';
    var nextUrl = new URL(window.location.href);
    if (view === 'pending') nextUrl.searchParams.delete('view');
    else nextUrl.searchParams.set('view', view);
    window.history.replaceState({}, '', nextUrl.toString());
    applyView();
    if (view === 'billing' && !state.billing) {
      ensureBillingData().then(function() {
        applyView();
      }).catch(function(err) {
        renderError(err.message);
        toast(err.message, 'err');
      });
    }
  }

  function timeAgo(iso) {
    if (!iso) return '暂无';
    var value = new Date(iso).getTime();
    if (Number.isNaN(value)) return '暂无';
    var delta = Date.now() - value;
    if (delta < 60 * 1000) return '刚刚';
    if (delta < 60 * 60 * 1000) return Math.floor(delta / (60 * 1000)) + ' 分钟前';
    if (delta < 24 * 60 * 60 * 1000) return Math.floor(delta / (60 * 60 * 1000)) + ' 小时前';
    return Math.floor(delta / (24 * 60 * 60 * 1000)) + ' 天前';
  }

  function statusTag(label, tone) {
    return '<span class="tag" data-tone="' + esc(tone || 'muted') + '">' + esc(label) + '</span>';
  }

  function bindingTag(user) {
    return user.needsBinding
      ? statusTag('待绑定', 'danger')
      : statusTag('已绑定', 'ok');
  }

  function feedbackTag(user) {
    return user.openFeedback ? statusTag('反馈待处理', 'warn') : '';
  }

  function lifecycleTag(user) {
    var tone = 'muted';
    if (user.needsBinding) tone = 'danger';
    else if (['power_user', 'active', 'onboarding'].indexOf(user.engagementTier) >= 0) tone = 'ok';
    else if (['at_risk', 'cooling'].indexOf(user.engagementTier) >= 0) tone = 'warn';
    else if (['churned', 'never_used'].indexOf(user.engagementTier) >= 0) tone = 'danger';
    return statusTag(user.lifecycleLabel || '观察中', tone);
  }

  function queueTag(queueKey) {
    var meta = PENDING_QUEUE_META[queueKey];
    return meta ? statusTag(meta.label, meta.tone) : '';
  }

  function rawInstanceUsageKey(instance) {
    var usage = instance.usage || {};
    var key = String(usage.usageStatus || '').toLowerCase();
    if (key === 'active') return 'occupied';
    if (key === 'stale') return 'occupied';
    if (key === 'opened') return 'open';
    if (key === 'reserved') return 'reserved';
    return key;
  }

  function instanceUsage(instance) {
    var key = rawInstanceUsageKey(instance);
    if (key === 'occupied') return { key: 'occupied', label: '已占用', tone: 'accent' };
    if (key === 'reserved') return { key: 'reserved', label: '预留', tone: 'warn' };
    if (key === 'open' || key === 'opened') return { key: 'available', label: '可分配', tone: 'ok' };
    if (key === 'empty') return { key: 'empty', label: '空置', tone: 'muted' };
    return { key: 'empty', label: '未归类', tone: 'muted' };
  }

  function instanceBindingDisplay(instance, boundUser) {
    if (instance && instance.occupancy && instance.occupancy.userName) {
      return {
        userName: instance.occupancy.userName,
        note: String(instance.occupancy.handoffNote || '').trim(),
        kind: String(instance.occupancy.kind || '').trim() || 'assigned'
      };
    }
    if (boundUser && boundUser.userName) {
      return {
        userName: boundUser.userName,
        note: '',
        kind: 'bound'
      };
    }
    return null;
  }

  function instanceBuildStatus(instance) {
    var build = instance && instance.build || null;
    var status = String(build && build.status || '').toLowerCase();
    if (status === 'stale_runtime') {
      return { key: 'stale_runtime', label: '落后 owner', tone: 'warn', detail: String(build.detail || '本地运行版本落后于 owner 基线。').trim() };
    }
    if (status === 'public_mismatch') {
      return { key: 'public_mismatch', label: '公网偏差', tone: 'warn', detail: String(build.detail || '公网入口返回的版本和本地实例不一致。').trim() };
    }
    if (status === 'current') {
      return { key: 'current', label: String(build.label || '当前版本').trim(), tone: 'ok', detail: String(build.detail || '实例版本状态正常。').trim() };
    }
    return { key: 'unknown', label: '待确认', tone: 'muted', detail: '版本检查尚未完成。' };
  }

  function instanceHealth(instance) {
    var optimisticAction = String(instance && instance.optimisticAction || '').toLowerCase();
    if (optimisticAction === 'start') {
      return { key: 'starting', label: '启动中', tone: 'accent', detail: '已发送启动请求，等待下一次健康检查。' };
    }
    if (optimisticAction === 'restart') {
      return { key: 'restarting', label: '重启中', tone: 'accent', detail: '已发送重启请求，等待下一次健康检查。' };
    }
    if (optimisticAction === 'stop') {
      return { key: 'stopping', label: '停止中', tone: 'warn', detail: '已发送停止请求，等待后台同步。' };
    }
    if (instance.localReachable === null && instance.publicReachable === null) {
      return { key: 'unknown', label: '待确认', tone: 'muted', detail: '健康检查尚未完成。' };
    }
    if (instance.localReachable && instance.publicReachable !== false) {
      var buildStatus = instanceBuildStatus(instance);
      if (buildStatus.key === 'stale_runtime' || buildStatus.key === 'public_mismatch') {
        return buildStatus;
      }
      return { key: 'healthy', label: '健康', tone: 'ok', detail: '本地和公网入口都正常。' };
    }
    if (instance.localReachable && instance.publicReachable === false) {
      return { key: 'public_issue', label: '公网异常', tone: 'warn', detail: '本地可达，但公网入口失败。' };
    }
    if (!instance.localReachable && instance.publicReachable) {
      return { key: 'local_issue', label: '本地异常', tone: 'warn', detail: '公网可达，但本地探测失败。' };
    }
    return { key: 'offline', label: '离线', tone: 'danger', detail: '本地和公网都不可达。' };
  }

  function activityText(user) {
    if (user.metrics && user.metrics.daysSinceLastMessage != null) {
      return user.metrics.daysSinceLastMessage === 0 ? '今天活跃' : user.metrics.daysSinceLastMessage + ' 天前';
    }
    return timeAgo(user.latestEventAt);
  }

  function instanceUsageSummary(instance) {
    return (instance && instance.usage && instance.usage.usageSummary) || null;
  }

  function instanceUsageTotals(instance) {
    var summary = instanceUsageSummary(instance);
    return (summary && summary.totals) || {};
  }

  function instanceLastActivityAt(instance) {
    var value = instance && instance.usage && instance.usage.lastSessionAt
      ? new Date(instance.usage.lastSessionAt).getTime()
      : 0;
    return Number.isFinite(value) ? value : 0;
  }

  function instanceTotalTokens(instance) {
    return Number(instanceUsageTotals(instance).totalTokens || 0);
  }

  function instanceUsageCost(instance) {
    var totals = instanceUsageTotals(instance);
    return Number(totals.costUsd || 0) + Number(totals.estimatedCostUsd || 0);
  }

  function instanceUsageRuns(instance) {
    return Number(instanceUsageTotals(instance).runCount || 0);
  }

  function isRecentlyUsedInstance(instance) {
    var lastAt = instanceLastActivityAt(instance);
    if (!lastAt) return false;
    return Date.now() - lastAt <= 7 * 24 * 60 * 60 * 1000;
  }

  function compareText(left, right) {
    return String(left || '').localeCompare(String(right || ''));
  }

  function compareNumberDesc(left, right) {
    if (left === right) return 0;
    return right - left;
  }

  function compareFlagDesc(left, right) {
    if (!!left === !!right) return 0;
    return left ? -1 : 1;
  }

  function compareInstances(left, right) {
    var sort = currentSort();
    if (sort === 'recent') {
      return compareNumberDesc(instanceLastActivityAt(left), instanceLastActivityAt(right))
        || compareNumberDesc(instanceTotalTokens(left), instanceTotalTokens(right))
        || compareText(left.name, right.name);
    }
    if (sort === 'usage') {
      return compareNumberDesc(instanceTotalTokens(left), instanceTotalTokens(right))
        || compareNumberDesc(instanceUsageRuns(left), instanceUsageRuns(right))
        || compareNumberDesc(instanceLastActivityAt(left), instanceLastActivityAt(right))
        || compareText(left.name, right.name);
    }
    if (sort === 'cost') {
      return compareNumberDesc(instanceUsageCost(left), instanceUsageCost(right))
        || compareNumberDesc(instanceTotalTokens(left), instanceTotalTokens(right))
        || compareNumberDesc(instanceLastActivityAt(left), instanceLastActivityAt(right))
        || compareText(left.name, right.name);
    }
    if (sort === 'runs') {
      return compareNumberDesc(instanceUsageRuns(left), instanceUsageRuns(right))
        || compareNumberDesc(instanceTotalTokens(left), instanceTotalTokens(right))
        || compareNumberDesc(instanceLastActivityAt(left), instanceLastActivityAt(right))
        || compareText(left.name, right.name);
    }
    if (sort === 'name') {
      return compareText(left.name, right.name);
    }
    return compareFlagDesc(isRecentlyUsedInstance(left), isRecentlyUsedInstance(right))
      || compareNumberDesc(instanceLastActivityAt(left), instanceLastActivityAt(right))
      || compareNumberDesc(instanceTotalTokens(left), instanceTotalTokens(right))
      || compareNumberDesc(instanceUsageRuns(left), instanceUsageRuns(right))
      || compareFlagDesc(rawInstanceUsageKey(left) === 'occupied' || rawInstanceUsageKey(left) === 'reserved', rawInstanceUsageKey(right) === 'occupied' || rawInstanceUsageKey(right) === 'reserved')
      || compareFlagDesc(rawInstanceUsageKey(left) === 'open', rawInstanceUsageKey(right) === 'open')
      || compareText(left.name, right.name);
  }

  function formatTokenCount(value) {
    var num = Number(value || 0);
    if (!Number.isFinite(num) || num <= 0) return '0';
    if (num >= 1000000) return (num / 1000000).toFixed(num >= 10000000 ? 0 : 1).replace(/\.0$/, '') + 'M';
    if (num >= 1000) return (num / 1000).toFixed(num >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
    return String(Math.round(num));
  }

  function formatUsd(value) {
    var num = Number(value || 0);
    if (!Number.isFinite(num) || num <= 0) return '$0';
    if (num >= 10) return '$' + num.toFixed(0);
    if (num >= 1) return '$' + num.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    return '$' + num.toFixed(3).replace(/0+$/, '').replace(/\.$/, '');
  }

  function formatPercent(value) {
    var num = Number(value);
    if (!Number.isFinite(num) || num <= 0) return '0%';
    return (num * 100).toFixed(num >= 0.1 ? 0 : 1).replace(/\.0$/, '') + '%';
  }

  function formatUsageCost(totals) {
    var exact = Number(totals && totals.costUsd || 0);
    var estimated = Number(totals && totals.estimatedCostUsd || 0);
    var partial = Number(totals && totals.unpricedRunCount || 0) > 0;
    var label = '$0';
    if (exact > 0 && estimated > 0) {
      label = formatUsd(exact) + ' (+' + formatUsd(estimated) + ' 估算)';
    } else if (exact > 0) {
      label = formatUsd(exact);
    } else if (estimated > 0) {
      label = formatUsd(estimated) + ' 估算';
    } else if (partial) {
      label = '未覆盖';
    }
    if (partial && (exact > 0 || estimated > 0)) {
      label += ' · 部分覆盖';
    }
    return label;
  }

  function usageCostCoverageLabel(totals) {
    var unpricedRuns = Number(totals && totals.unpricedRunCount || 0);
    var coverageShare = Number(totals && totals.costCoverageShare);
    var coverageText = '';
    if (!unpricedRuns) return '费用优先用 provider 返回值，缺失时再按价格表估算。';
    if (Number.isFinite(coverageShare) && coverageShare > 0) {
      coverageText = coverageShare < 1 && coverageShare >= 0.95
        ? ((coverageShare * 100).toFixed(1).replace(/\.0$/, '') + '%')
        : formatPercent(coverageShare);
      return '费用优先用 provider 返回值，缺失时再按价格表估算；当前覆盖约 ' + coverageText + ' tokens。';
    }
    return '当前调用都没有可用价格，所以费用还没法估。';
  }

  function usageFlowLabel(totals) {
    var cached = Number(totals && totals.cachedInputTokens || 0);
    if (cached > 0) return '新增输入 / 输出';
    return '输入增量 / 输出';
  }

  function usageCacheShare(totals) {
    var input = Number(totals && totals.inputTokens || 0);
    var cached = Number(totals && totals.cachedInputTokens || 0);
    if (!Number.isFinite(input) || input <= 0 || !Number.isFinite(cached) || cached <= 0) return null;
    return Math.max(0, Math.min(1, cached / input));
  }

  function usageContextLabel(totals) {
    if (!totals) return '';
    var context = Number(totals.maxContextTokens);
    var windowTokens = Number(totals.maxContextWindowTokens);
    if (Number.isFinite(context) && context > 0 && Number.isFinite(windowTokens) && windowTokens > 0) {
      return formatTokenCount(context) + ' / ' + formatTokenCount(windowTokens);
    }
    if (Number.isFinite(context) && context > 0) {
      return formatTokenCount(context);
    }
    return '';
  }

  function instanceUsageHeadline(instance) {
    var summary = instanceUsageSummary(instance);
    var totals = instanceUsageTotals(instance);
    if (!summary) return '暂无数据';
    if (!(totals.runCount || 0) && !(summary.filesScanned || 0) && !(summary.recordsScanned || 0)) {
      return '暂无数据';
    }
    return formatTokenCount(totals.totalTokens) + ' tokens';
  }

  function instanceUsageNote(instance) {
    var summary = instanceUsageSummary(instance);
    var totals = instanceUsageTotals(instance);
    if (!summary) return '当前实例还没有 usage ledger。';
    if (!(totals.runCount || 0) && !(summary.filesScanned || 0) && !(summary.recordsScanned || 0)) {
      return '当前实例还没有 usage ledger。';
    }
    var topTool = summary.byTool && summary.byTool.length ? summary.byTool[0].key : '';
    var note = formatUsageCost(totals) + ' · ' + (totals.runCount || 0) + ' 次调用';
    if (topTool) note += ' · ' + topTool;
    return note;
  }

  function formatBuildLabel(value) {
    var text = String(value || '').trim();
    return text || '待确认';
  }

  function missingInstanceHealth(detail) {
    return {
      key: 'unknown',
      label: '待确认',
      tone: 'muted',
      detail: detail || '实例状态等待下一次同步。'
    };
  }

  function buildUserInstanceHealth(instance, detailOverride) {
    if (!instance) return missingInstanceHealth(detailOverride);
    var health = instanceHealth(instance);
    return {
      key: health.key,
      label: health.label,
      tone: health.tone,
      detail: detailOverride || health.detail
    };
  }

  function instancePrimaryAction(instance) {
    var optimisticAction = String(instance && instance.optimisticAction || '').toLowerCase();
    if (optimisticAction === 'start' || optimisticAction === 'restart') {
      return { action: 'stop', label: '停止', tone: 'danger' };
    }
    if (optimisticAction === 'stop') {
      return { action: 'start', label: '启动', tone: 'success' };
    }
    var health = instanceHealth(instance);
    return health.key === 'healthy' || health.key === 'public_issue' || health.key === 'local_issue'
      ? { action: 'stop', label: '停止', tone: 'danger' }
      : { action: 'start', label: '启动', tone: 'success' };
  }

  function touchLocalCacheTime() {
    var iso = new Date().toISOString();
    if (state.workbench) state.workbench.cachedAt = iso;
    if (state.dashboard) state.dashboard.cachedAt = iso;
    if (state.billing) state.billing.cachedAt = iso;
  }

  function refreshLocalInstanceSummary() {
    if (!state.dashboard || !Array.isArray(state.dashboard.instances)) return;
    var summary = {
      total: state.dashboard.instances.length,
      occupied: 0,
      open: 0,
      empty: 0,
      attention: 0
    };
    var emptyNames = [];
    state.dashboard.instances.forEach(function(instance) {
      var usageKey = rawInstanceUsageKey(instance);
      if (usageKey === 'occupied' || usageKey === 'reserved') summary.occupied += 1;
      else if (usageKey === 'open') summary.open += 1;
      else {
        summary.empty += 1;
        emptyNames.push(instance.name);
      }
      if (instanceHealth(instance).key !== 'healthy') summary.attention += 1;
    });
    state.workbench.instanceSummary = Object.assign({}, state.workbench.instanceSummary || {}, summary);
    state.dashboard.summary = Object.assign({}, state.dashboard.summary || {}, {
      totalCount: summary.total,
      occupiedCount: summary.occupied,
      openedCount: summary.open,
      emptyCount: summary.empty,
      emptyNames: emptyNames
    });
  }

  function patchInstanceRecord(name, mapper) {
    if (!state.dashboard || !Array.isArray(state.dashboard.instances)) return null;
    var nextInstances = state.dashboard.instances.slice();
    var index = nextInstances.findIndex(function(instance) { return instance.name === name; });
    if (index < 0) return null;
    var current = nextInstances[index];
    var next = mapper(Object.assign({}, current, {
      usage: Object.assign({}, current.usage || {})
    }));
    if (!next) return null;
    nextInstances[index] = next;
    state.dashboard.instances = nextInstances;
    return next;
  }

  function removeInstanceRecord(name) {
    if (!state.dashboard || !Array.isArray(state.dashboard.instances)) return null;
    var removed = null;
    state.dashboard.instances = state.dashboard.instances.filter(function(instance) {
      if (instance.name !== name) return true;
      removed = instance;
      return false;
    });
    return removed;
  }

  function upsertInstanceRecord(instance) {
    if (!state.dashboard || !Array.isArray(state.dashboard.instances) || !instance || !instance.name) return null;
    var existing = state.dashboard.instances.filter(function(entry) { return entry.name !== instance.name; });
    state.dashboard.instances = [instance].concat(existing);
    return instance;
  }

  function buildLocalCreatedInstance(result) {
    var name = String(result && result.name || '').trim();
    if (!name) return null;
    return Object.assign({}, result, {
      name: name,
      publicBaseUrl: String(result && result.publicBaseUrl || '').trim(),
      bridgeBaseUrl: String(result && result.bridgeBaseUrl || '').trim(),
      localBaseUrl: String(result && result.localBaseUrl || '').trim(),
      publicAccessUrl: String(result && result.publicAccessUrl || '').trim(),
      bridgeAccessUrl: String(result && result.bridgeAccessUrl || '').trim(),
      localAccessUrl: String(result && result.localAccessUrl || '').trim(),
      accessChannels: Array.isArray(result && result.accessChannels) ? result.accessChannels.slice() : [],
      createdAt: String(result && result.createdAt || new Date().toISOString()).trim(),
      localReachable: typeof result?.localReachable === 'boolean' ? result.localReachable : true,
      publicReachable: typeof result?.publicReachable === 'boolean' ? result.publicReachable : null,
      usage: Object.assign({
        sessionCount: 0,
        authSessionCount: 0,
        lastSessionAt: '',
        usageStatus: 'opened',
        usageBrief: '刚创建，等待使用',
        usageSummary: null,
      }, result && result.usage ? result.usage : {}),
    });
  }

  function applyLocalCreatedInstance(result) {
    if (!state.dashboard || !state.workbench) return false;
    var created = buildLocalCreatedInstance(result);
    if (!created) return false;
    upsertInstanceRecord(created);
    refreshLocalInstanceSummary();
    touchLocalCacheTime();
    setView('instances');
    state.search = created.name;
    document.getElementById('search-input').value = created.name;
    applyView();
    return true;
  }

  function patchUsersByInstance(name, mapper) {
    if (!state.workbench || !state.workbench.users || !Array.isArray(state.workbench.users.rows)) return;
    state.workbench.users.rows = state.workbench.users.rows.map(function(user) {
      if (user.instanceName !== name) return user;
      return mapper(Object.assign({}, user, {
        quickLinks: Object.assign({}, user.quickLinks || {}),
        instanceHealth: user.instanceHealth ? Object.assign({}, user.instanceHealth) : null,
        instanceDetail: user.instanceDetail ? Object.assign({}, user.instanceDetail) : null
      })) || user;
    });
  }

  function applyLocalInstanceAction(name, action) {
    if (!state.dashboard || !state.workbench) return false;
    if (action === 'delete') {
      var removed = removeInstanceRecord(name);
      if (!removed) return false;
      patchUsersByInstance(name, function(user) {
        user.instanceHealth = missingInstanceHealth('实例已删除，等待下一次同步。');
        user.instanceDetail = null;
        user.quickLinks = {
          publicAccessUrl: '',
          bridgeAccessUrl: '',
          localAccessUrl: '',
          accessChannels: []
        };
        return user;
      });
      refreshLocalInstanceSummary();
      touchLocalCacheTime();
      applyView();
      return true;
    }

    var updated = patchInstanceRecord(name, function(instance) {
      instance.optimisticAction = action;
      if (action === 'stop') {
        instance.localReachable = false;
        instance.publicReachable = false;
        instance.usage.usageBrief = '已停止，等待同步';
      } else if (action === 'start') {
        instance.localReachable = null;
        instance.publicReachable = null;
        instance.usage.usageBrief = '启动中，等待健康检查';
      } else if (action === 'restart') {
        instance.localReachable = null;
        instance.publicReachable = null;
        instance.usage.usageBrief = '重启中，等待健康检查';
      }
      return instance;
    });
    if (!updated) return false;
    patchUsersByInstance(name, function(user) {
      user.instanceHealth = buildUserInstanceHealth(updated);
      return user;
    });
    refreshLocalInstanceSummary();
    touchLocalCacheTime();
    applyView();
    return true;
  }

  function routeLine(label, href) {
    if (!href) return '';
    var display = href.replace(/^https?:\/\//, '').replace(/\/+$/, '');
    return '<div class="link-item">' +
      '<span class="link-label">' + esc(label) + '</span>' +
      '<span class="cell-note">' + esc(display) + '</span>' +
      '<a class="link-chip" href="' + esc(href) + '" target="_blank" rel="noreferrer">Open</a>' +
      '<button class="link-chip" type="button" data-copy="' + esc(href) + '">Copy</button>' +
    '</div>';
  }

  function accessChannelsFor(source) {
    var fallback = [];
    if (Array.isArray(source && source.accessChannels) && source.accessChannels.length) {
      return source.accessChannels.filter(function(channel) {
        return channel && (channel.accessUrl || channel.baseUrl);
      }).map(function(channel) {
        return {
          key: String(channel.key || '').trim(),
          label: String(channel.label || '').trim() || 'Route',
          href: String(channel.accessUrl || channel.baseUrl || '').trim()
        };
      });
    }

    if (source && (source.publicAccessUrl || source.publicBaseUrl)) {
      fallback.push({ key: 'public', label: 'Public', href: String(source.publicAccessUrl || source.publicBaseUrl).trim() });
    }
    if (source && (source.bridgeAccessUrl || source.bridgeBaseUrl)) {
      fallback.push({
        key: 'bridge',
        label: 'Bridge',
        href: String(source.bridgeAccessUrl || source.bridgeBaseUrl).trim()
      });
    }
    if (source && (source.localAccessUrl || source.localBaseUrl)) {
      fallback.push({ key: 'local', label: 'Local', href: String(source.localAccessUrl || source.localBaseUrl).trim() });
    }
    return fallback;
  }

  function renderAccessRoutes(source) {
    return accessChannelsFor(source).map(function(channel) {
      return routeLine(channel.label, channel.href);
    }).join('');
  }

  function renderAccessTags(source) {
    return accessChannelsFor(source).map(function(channel) {
      var tone = channel.key === 'public' ? 'accent' : 'muted';
      return statusTag(channel.label, tone);
    }).join('');
  }

  function renderTimeline(events) {
    if (!events || !events.length) {
      return '<p class="muted">还没有可展示的事件流水。</p>';
    }
    return '<div class="timeline">' + events.map(function(event) {
      return '<div class="timeline-item">' +

  function billingMatchesQuery(parts) {
    var query = state.search.trim().toLowerCase();
    if (!query) return true;
    return parts.join(' ').toLowerCase().indexOf(query) >= 0;
  }

  function billingMatchesFilter(entry) {
    var filter = currentFilter();
    if (filter === 'background') return Number(entry && entry.backgroundShare || 0) >= 0.3;
    if (filter === 'foreground') return Number(entry && entry.backgroundShare || 0) < 0.3;
    if (filter === 'exactCost') return Number(entry && entry.costUsd || 0) > 0;
    if (filter === 'estimated') return Number(entry && entry.costUsd || 0) <= 0 && Number(entry && entry.estimatedCostUsd || 0) > 0;
    return true;
  }

  function billingShareTone(value) {
    var num = Number(value);
    if (!Number.isFinite(num)) return '';
    if (num >= 0.35) return 'warn';
    if (num <= 0.12) return 'ok';
    return '';
  }

  function renderAnalyticsMeter(value, tone) {
    var num = Math.max(0, Math.min(1, Number(value || 0)));
    return '<div class="analytics-meter"><span class="analytics-meter-fill"' +

      ' style="width:' + esc(String(Math.round(num * 100))) + '%"></span></div>';

    var pairGrid = '<div class="analytics-pair-grid">' +

        { label: '后台占比', value: billingSummary.backgroundShare != null ? formatPercent(billingSummary.backgroundShare) : '0%', note: '区分前台对话和后台自动功能', tone: billingSummary.backgroundShare >= 0.3 ? 'warn' : 'ok' },
        { label: '已归因用户', value: billingSummary.usersWithUsage || 0, note: '按实例绑定归因到用户', tone: billingSummary.usersWithUsage ? 'ok' : 'muted' },
        { label: '总费用', value: formatUsageCost(billingSummary), note: usageCostCoverageLabel(billingSummary), tone: (Number(billingSummary.costUsd || 0) || Number(billingSummary.estimatedCostUsd || 0)) ? 'accent' : 'muted' }

        { label: '异常', value: instanceSummary.attention, note: '技术健康或版本漂移需要诊断', tone: instanceSummary.attention ? 'danger' : 'ok' }

    document.getElementById('metric-grid').innerHTML = metrics.map(function(metric) {
      return '<article class="metric-card" data-tone="' + esc(metric.tone || 'muted') + '">' +
        '<span class="metric-label">' + esc(metric.label) + '</span>' +
        '<strong>' + esc(metric.value) + '</strong>' +
        '<p class="metric-note">' + esc(metric.note) + '</p>' +

    if (state.view === 'billing') {

        '<span>' + esc((state.billing.byUser || []).length) + ' 位用户有计费数据</span>';

  function syncNav() {
    var pendingCount = document.getElementById('nav-pending-count');
    var usersCount = document.getElementById('nav-users-count');
    var instancesCount = document.getElementById('nav-instances-count');
    var billingCount = document.getElementById('nav-billing-count');
    if (state.workbench) {
      var pendingTotal = (state.workbench.pending.summary.needsBindingCount || 0)
        + (state.workbench.pending.summary.feedbackCount || 0)
        + (state.workbench.pending.summary.followUpCount || 0);
      pendingCount.textContent = String(pendingTotal);
      usersCount.textContent = String(state.workbench.summary.totalUsers || 0);
      instancesCount.textContent = String(state.workbench.instanceSummary.attention || 0);
    } else {
      pendingCount.textContent = '…';
      usersCount.textContent = '…';
      instancesCount.textContent = '…';
    }
    billingCount.textContent = state.billing ? String((state.billing.byUser || []).length || 0) : '…';

    Array.from(document.querySelectorAll('[data-view]')).forEach(function(link) {
      link.classList.toggle('is-active', link.getAttribute('data-view') === state.view);
    });
  }

  function syncViewVisibility() {
    document.getElementById('pending-view').hidden = state.view !== 'pending';
    document.getElementById('users-view').hidden = state.view !== 'users';
    document.getElementById('instances-view').hidden = state.view !== 'instances';
    document.getElementById('billing-view').hidden = state.view !== 'billing';
  }

  function renderLoading() {
    document.getElementById('metric-grid').innerHTML =
      '<div class="skeleton-grid">' +
        '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>' +
      '</div>';
    var skeletonList = '<section class="panel section-panel"><div class="skeleton-list"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div></section>';
    document.getElementById('pending-view').innerHTML = '';
    document.getElementById('users-view').innerHTML = '';
    document.getElementById('instances-view').innerHTML = '';
    document.getElementById('billing-view').innerHTML = '';

  function renderError(message) {
    var html = '<section class="panel section-panel"><div class="error-state">' + esc(message) + '<div><button class="btn btn-primary" id="btn-retry">Retry</button></div></div></section>';
    document.getElementById('pending-view').innerHTML = '';
    document.getElementById('users-view').innerHTML = '';
    document.getElementById('instances-view').innerHTML = '';
    document.getElementById('billing-view').innerHTML = '';
    document.getElementById(activeViewContainerId()).innerHTML = html;
    var retry = document.getElementById('btn-retry');
    if (retry) retry.onclick = function() {
      loadAll({ includeBilling: state.view === 'billing' || !!state.billing }).catch(function() {});
    };
  }

  function applyView() {
    if (!state.workbench || !state.dashboard || (state.view === 'billing' && !state.billing)) {
      renderControls();
      syncNav();
      syncViewVisibility();
      renderLoading();
      document.getElementById('cache-pill').textContent = '加载中';
      return;
    }
    renderOverview();
    renderControls();
    syncNav();
    syncViewVisibility();

    if (state.view === 'pending') renderPendingView();
    else if (state.view === 'users') renderUsersView();
    else if (state.view === 'instances') renderInstancesView();
    else renderBillingView();

    document.getElementById('cache-pill').textContent = '已更新 ' + timeAgo((state.billing && state.billing.cachedAt) || state.workbench.cachedAt || state.dashboard.cachedAt);
  }

  function ensureBillingData(options) {
    var force = options && options.force;
    var checks = options && options.checks;
    if (state.billing && !force) {
      return Promise.resolve(state.billing);
    }
    if (state.billingPromise) {
      return state.billingPromise;
    }
    state.billingPromise = api(buildApiPath('api/billing', {
      force: !!force,
      checks: !!checks
    })).then(function(data) {
      state.billing = data;
      return data;
    }).finally(function() {
      state.billingPromise = null;
    });
    return state.billingPromise;
  }

  async function loadAll(options) {
    options = options || {};
    var includeBilling = options.includeBilling === true || state.view === 'billing' || !!state.billing;
    renderLoading();
    try {
      var requests = [
        api(buildApiPath('api/workbench', {
          force: !!options.force,
          checks: !!options.checks
        })),
        api(buildApiPath('api/dashboard', {
          force: !!options.force,
          checks: !!options.checks
        }))
      ];
      if (includeBilling) {
        requests.push(ensureBillingData({
          force: !!options.force,
          checks: !!options.checks
        }));
      }
      var results = await Promise.all(requests);
      state.workbench = results[0];
      state.dashboard = results[1];
      if (includeBilling) state.billing = results[2];
      applyView();
    } catch (err) {
      renderError(err.message);
      toast(err.message, 'err');
      throw err;
    }
  }

  async function forceRefresh() {
    var btn = document.getElementById('btn-refresh');
    btn.disabled = true;
    btn.textContent = 'Refreshing';
    try {
      await loadAll({
        force: true,
        checks: true,
        includeBilling: state.view === 'billing' || !!state.billing
      });
      toast('已刷新', 'ok');
    } catch (err) {
      toast('刷新失败：' + err.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = '刷新';
    }
  }

  async function createTrial() {
    var btn = document.getElementById('btn-trial');
    btn.disabled = true;
    toast('正在创建试用实例', 'info');
    try {
      var result = await api('api/instances/create', { method: 'POST', body: { trial: true } });
      toast('已创建 ' + result.name, 'ok');
      if (!applyLocalCreatedInstance(result)) {
        toast('列表未就绪，请手动刷新查看新实例', 'info');
      }
    } catch (err) {
      toast('创建失败：' + err.message, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  function showCreateDialog() {
    document.getElementById('inp-name').value = '';
    document.getElementById('dlg-create').showModal();
    document.getElementById('inp-name').focus();
  }

  async function confirmCreate() {
    var raw = document.getElementById('inp-name').value.trim();
    if (!raw) {
      toast('实例名不能为空', 'err');
      return;
    }
    document.getElementById('dlg-create').close();
    toast('正在创建 ' + raw, 'info');
    try {
      var result = await api('api/instances/create', { method: 'POST', body: { name: raw } });
      toast('已创建 ' + result.name, 'ok');
      if (!applyLocalCreatedInstance(result)) {
        toast('列表未就绪，请手动刷新查看新实例', 'info');
      }
    } catch (err) {
      toast('创建失败：' + err.message, 'err');
    }
  }

  async function instanceAction(name, action) {
    toast('正在' + action + ' ' + name, 'info');
    try {
      await api('api/instances/' + encodeURIComponent(name) + '/' + action, { method: 'POST' });
      applyLocalInstanceAction(name, action);
      toast(name + ' 已' + action, 'ok');
    } catch (err) {
      toast(action + ' 失败：' + err.message, 'err');
    }
  }

  function showDeleteDialog(name) {
    state.pendingDelete = name;
    document.getElementById('del-name').textContent = name;
    document.getElementById('dlg-delete').showModal();
  }

  async function confirmDelete() {
    if (!state.pendingDelete) return;
    var name = state.pendingDelete;
    state.pendingDelete = null;
    document.getElementById('dlg-delete').close();
    toast('正在删除 ' + name, 'info');
    try {
      await api('api/instances/' + encodeURIComponent(name) + '/delete', { method: 'POST' });
      applyLocalInstanceAction(name, 'delete');
      toast(name + ' 已删除', 'ok');
    } catch (err) {
      toast('删除失败：' + err.message, 'err');
    }
  }

    var btn = document.getElementById('btn-converge');
    btn.disabled = true;
    toast('正在收敛实例库存', 'info');
    try {
      var result = await api('api/converge', { method: 'POST' });
      toast('已收敛 ' + (Array.isArray(result) ? result.length : 0) + ' 个实例', 'ok');
    } catch (err) {
      toast('收敛失败：' + err.message, 'err');

      btn.disabled = false;

    setView(link.getAttribute('data-view'));

    if (!chip) return;
    state.filters[state.view] = chip.getAttribute('data-filter');
    applyView();

    state.search = String(event.target.value || '');

    state.sorts[state.view] = String(event.target.value || 'default');
    applyView();
  });

  document.body.addEventListener('click', function(event) {
    var copyNode = event.target.closest('[data-copy]');
    if (copyNode) {
      copyText(copyNode.getAttribute('data-copy'));
      return;
    }

    var navNode = event.target.closest('[data-go-view]');
    if (navNode) {
      var nextView = navNode.getAttribute('data-go-view') || 'pending';
      var nextFilter = navNode.getAttribute('data-filter');
      var nextSearch = navNode.getAttribute('data-search') || '';
      if (nextFilter) state.filters[nextView] = nextFilter;
      setView(nextView);
      state.search = nextSearch;
      document.getElementById('search-input').value = nextSearch;
      applyView();
      return;
    }

    var instanceActionNode = event.target.closest('[data-instance-action]');
    if (instanceActionNode) {
      var name = instanceActionNode.getAttribute('data-name');
      var action = instanceActionNode.getAttribute('data-instance-action');
      if (action === 'delete') showDeleteDialog(name);
      else instanceAction(name, action);
    }
  });

      topbarToggle.onclick = function(e) {
        e.stopPropagation();
        var expanded = topbar.classList.toggle('is-expanded');
        topbarToggle.setAttribute('aria-expanded', String(expanded));
        topbarToggle.classList.toggle('is-active', expanded);
      };
      document.addEventListener('click', function(e) {
        if (topbar.classList.contains('is-expanded') && !topbar.contains(e.target)) {
          topbar.classList.remove('is-expanded');
          topbarToggle.setAttribute('aria-expanded', 'false');
          topbarToggle.classList.remove('is-active');
        }
      });
    }

    if (summaryToggle) {
      summaryToggle.onclick = function() {
        var expanded = pagePanel.classList.toggle('is-expanded');
        summaryToggle.setAttribute('aria-expanded', String(expanded));
        summaryToggle.classList.toggle('is-open', expanded);
        summaryToggle.querySelector('span').textContent = expanded ? '收起数据' : '展开数据';
      };
    }
  })();

  window.addEventListener('popstate', function() {
    state.view = readViewFromLocation();
    applyView();
    if (state.view === 'billing' && !state.billing) {
      ensureBillingData().then(function() {
        applyView();
      }).catch(function(err) {
        renderError(err.message);
        toast(err.message, 'err');
      });
    }
  });

  loadAll().catch(function() {});
})();
</script>
</body>
</html>
